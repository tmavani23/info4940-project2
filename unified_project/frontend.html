<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Unified p5 Emotion Chatbot</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/material-darker.min.css" />
<style>
*,
*::before,
*::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --bg: #0f1013;
  --surface: #16181e;
  --surface-2: #1e222c;
  --surface-3: #262b38;
  --border: #32384a;
  --text: #e6e9f2;
  --muted: #97a0b6;
  --accent: #5f8df7;
  --accent-2: #7ea5ff;
  --ok: #4dd4a6;
  --danger: #ef5d74;
  --radius: 14px;
}

body {
  height: 100vh;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: radial-gradient(1200px 700px at 0% 0%, #1a1e2a 0%, var(--bg) 55%);
  color: var(--text);
  overflow: hidden;
}

.app {
  display: flex;
  flex-direction: column;
  height: 100vh;
  position: relative;
}

.app-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  background: rgba(14, 16, 22, 0.75);
  backdrop-filter: blur(8px);
  z-index: 5;
}

.brand {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 14px;
  font-weight: 600;
}

.brand-dot {
  width: 10px;
  height: 10px;
  border-radius: 999px;
  background: linear-gradient(135deg, var(--accent), #9f83ff);
}

.header-controls {
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
}

.header-controls .history-trigger {
  width: auto;
}

.download-wrap {
  position: relative;
}

.download-menu {
  position: absolute;
  top: calc(100% + 8px);
  right: 0;
  z-index: 20;
  width: 230px;
  padding: 10px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  background: rgba(22, 24, 30, 0.98);
  border: 1px solid var(--border);
  border-radius: 14px;
  box-shadow: 0 18px 42px rgba(0, 0, 0, 0.34);
}

.download-menu[hidden] {
  display: none !important;
}

.download-menu-title {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: #aebad8;
  padding: 2px 4px 0;
}

.download-option {
  width: 100%;
  text-align: left;
  padding: 10px 12px;
  border-radius: 12px;
  background: #171c28;
  border-color: #3f4a63;
}

.phase-badge {
  font-size: 11px;
  font-weight: 600;
  color: #c7d4ff;
  background: rgba(95, 141, 247, 0.15);
  border: 1px solid rgba(95, 141, 247, 0.35);
  border-radius: 999px;
  padding: 4px 10px;
}

button {
  border: 1px solid var(--border);
  background: var(--surface-2);
  color: var(--text);
  border-radius: 10px;
  padding: 7px 12px;
  font-size: 12px;
  cursor: pointer;
  transition: 0.15s ease;
}

button:hover:not(:disabled) {
  border-color: var(--accent);
  background: var(--surface-3);
}

button:disabled {
  opacity: 0.45;
  cursor: default;
}

button.primary {
  background: var(--accent);
  border-color: var(--accent);
  color: white;
}

button.primary:hover:not(:disabled) {
  background: var(--accent-2);
  border-color: var(--accent-2);
}

button.ghost {
  background: transparent;
}

.workspace {
  flex: 1;
  min-height: 0;
  display: grid;
  grid-template-columns: 1.05fr 1.05fr 1.2fr;
  gap: 14px;
  padding: 14px;
}

.panel {
  background: rgba(22, 24, 30, 0.88);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  min-height: 0;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.panel-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  padding: 14px 16px 12px;
  border-bottom: 1px solid var(--border);
}

.panel-title {
  font-size: 18px;
  font-weight: 600;
}

.pane-expand-btn {
  border-radius: 999px;
  padding: 4px 10px;
  font-size: 11px;
  background: #131823;
  border-color: #44506b;
  color: #c9d5f7;
}

.chat-pane {
  display: flex;
  flex-direction: column;
  position: relative;
}

.messages {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.message {
  display: flex;
  align-items: flex-start;
  gap: 10px;
}

.message.optimistic.user {
  animation: messageSendIn 0.34s cubic-bezier(0.2, 0.7, 0.2, 1) both;
}

.message.user {
  flex-direction: row-reverse;
}

.message.system {
  justify-content: center;
}

.avatar {
  width: 30px;
  height: 30px;
  border-radius: 999px;
  display: grid;
  place-items: center;
  font-size: 14px;
  flex-shrink: 0;
}

.assistant-avatar {
  background: linear-gradient(135deg, var(--accent), #9f83ff);
  color: white;
}

.user-avatar {
  background: #3a4157;
}

.bubble {
  max-width: min(78%, 520px);
  padding: 10px 13px;
  border-radius: 13px;
  line-height: 1.5;
  font-size: 14px;
  word-break: break-word;
  white-space: pre-wrap;
}

.assistant .bubble {
  background: #202532;
  border-bottom-left-radius: 4px;
}

.assistant .bubble p,
.assistant .bubble ul,
.assistant .bubble ol,
.assistant .bubble h3,
.assistant .bubble h4 {
  margin: 0;
}

.assistant .bubble p + p,
.assistant .bubble p + ul,
.assistant .bubble p + ol,
.assistant .bubble ul + p,
.assistant .bubble ol + p,
.assistant .bubble h3 + p,
.assistant .bubble h4 + p,
.assistant .bubble ul + ul,
.assistant .bubble ol + ol {
  margin-top: 8px;
}

.assistant .bubble ul,
.assistant .bubble ol {
  padding-left: 18px;
}

.assistant .bubble li + li {
  margin-top: 4px;
}

.assistant .bubble h3,
.assistant .bubble h4 {
  font-size: 13px;
  color: #f2f5ff;
  letter-spacing: 0.01em;
}

.assistant .bubble strong {
  font-weight: 700;
  color: #08111f;
  background: linear-gradient(135deg, #d8e6ff, #8fb6ff);
  padding: 1px 6px;
  border-radius: 5px;
  box-shadow: 0 0 0 1px rgba(201, 222, 255, 0.28), 0 2px 10px rgba(95, 141, 247, 0.28);
}

.assistant .bubble code {
  font-family: "SF Mono", Menlo, Consolas, monospace;
  font-size: 12px;
  background: rgba(12, 16, 24, 0.72);
  border: 1px solid rgba(88, 101, 136, 0.45);
  border-radius: 5px;
  padding: 1px 5px;
}

.user .bubble {
  background: #2f4477;
  border-bottom-right-radius: 4px;
}

.system .bubble {
  max-width: min(90%, 640px);
  background: rgba(95, 141, 247, 0.08);
  border: 1px dashed rgba(95, 141, 247, 0.45);
  color: #c8d7ff;
}

.bubble img {
  max-width: 100%;
  border-radius: 10px;
}

.bubble audio {
  width: 260px;
}

.empty-hint {
  margin: auto;
  text-align: center;
  color: var(--muted);
  font-size: 13px;
  max-width: 300px;
  line-height: 1.6;
}

.chat-loading,
.chat-typing {
  display: flex;
  align-items: flex-start;
  gap: 10px;
}

.chat-loading .bubble,
.chat-typing .bubble {
  padding: 12px 16px;
  background: #202532;
  border-bottom-left-radius: 4px;
  border-radius: 13px;
  min-width: 64px;
}

.chat-typing .bubble {
  display: inline-flex;
  align-items: center;
  justify-content: center;
}

.typing-dots {
  display: inline-flex;
  align-items: center;
  gap: 6px;
}

.typing-dots span {
  width: 8px;
  height: 8px;
  border-radius: 999px;
  background: #95a7d8;
  opacity: 0.28;
  animation: typingBubblePulse 1.2s ease-in-out infinite;
}

.typing-dots span:nth-child(1) { animation-delay: 0s; }
.typing-dots span:nth-child(2) { animation-delay: 0.18s; }
.typing-dots span:nth-child(3) { animation-delay: 0.36s; }

@keyframes messageSendIn {
  0% {
    opacity: 0;
    transform: translateY(20px) scale(0.96);
  }
  100% {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
}

@keyframes typingBubblePulse {
  0%, 80%, 100% {
    opacity: 0.28;
    transform: translateY(0) scale(0.88);
    box-shadow: 0 0 0 rgba(126, 165, 255, 0);
  }
  40% {
    opacity: 1;
    transform: translateY(-2px) scale(1);
    box-shadow: 0 0 14px rgba(126, 165, 255, 0.55);
  }
}

.input-wrap {
  border-top: 1px solid var(--border);
  background: #171b24;
  padding: 10px 12px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  z-index: 1;
}

.template-row {
  display: flex;
  flex-direction: column;
  align-items: stretch;
  gap: 8px;
}

.template-row.scrollable {
  overflow-y: auto;
  overflow-x: hidden;
  overscroll-behavior-y: contain;
  max-height: 108px;
  padding-right: 4px;
  scrollbar-width: thin;
  scrollbar-color: #50607f #121826;
}

.template-row.scrollable::-webkit-scrollbar {
  width: 8px;
}

.template-row.scrollable::-webkit-scrollbar-track {
  background: #121826;
  border-radius: 999px;
}

.template-row.scrollable::-webkit-scrollbar-thumb {
  background: #50607f;
  border-radius: 999px;
}

.template-label {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: #d9e5ff;
}

.template-label::before {
  content: "Click to use";
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.08em;
  color: #88a6e8;
  background: rgba(95, 141, 247, 0.12);
  border: 1px solid rgba(95, 141, 247, 0.28);
  border-radius: 999px;
  padding: 3px 8px;
}

.template-chip {
  display: inline-flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  width: 100%;
  background: linear-gradient(180deg, #1b2334, #141c2c);
  border: 1px solid #50607f;
  color: #eef4ff;
  font-size: 12px;
  font-weight: 600;
  line-height: 1.35;
  padding: 7px 11px;
  border-radius: 12px;
  box-shadow: 0 6px 18px rgba(8, 12, 20, 0.24);
  transition: transform 0.14s ease, box-shadow 0.14s ease, border-color 0.14s ease, background 0.14s ease;
  text-align: left;
}

.template-chip::after {
  content: ">";
  font-size: 11px;
  font-weight: 700;
  color: #8fb4ff;
  opacity: 0.9;
}

.template-chip:hover:not(:disabled) {
  color: #ffffff;
  border-color: #8fb4ff;
  background: linear-gradient(180deg, #25314a, #182238);
  box-shadow: 0 10px 22px rgba(31, 59, 115, 0.28);
  transform: translateY(-1px);
}

.template-chip:active:not(:disabled) {
  transform: translateY(0);
}

.template-chip.decision {
  border-style: solid;
  border-color: #6e9cff;
  color: #ffffff;
  background: linear-gradient(180deg, #24345d, #1b2748);
}

.implement-cta {
  width: 100%;
  border: none;
  border-radius: 12px;
  padding: 11px 14px;
  background: linear-gradient(135deg, #5f8df7, #7ea5ff);
  color: #ffffff;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.01em;
  box-shadow: 0 10px 24px rgba(95, 141, 247, 0.24);
}

.implement-cta:hover:not(:disabled) {
  background: linear-gradient(135deg, #73a0ff, #93b6ff);
  border-color: transparent;
}

.preview-strip {
  display: none;
  align-items: center;
  gap: 10px;
  border: 1px solid var(--border);
  border-radius: 12px;
  background: #1d2230;
  padding: 8px 10px;
}

.preview-strip.active {
  display: flex;
}

.preview-strip img {
  width: 52px;
  height: 52px;
  object-fit: cover;
  border-radius: 8px;
}

.preview-strip audio {
  height: 34px;
}

.preview-name {
  font-size: 12px;
  color: var(--muted);
}

.remove-preview {
  margin-left: auto;
  background: transparent;
  border: none;
  color: var(--muted);
  font-size: 15px;
  cursor: pointer;
}

.input-bar {
  display: flex;
  align-items: flex-end;
  gap: 6px;
  border: 1px solid var(--border);
  border-radius: 14px;
  background: #1e2431;
  padding: 6px 7px 6px 9px;
}

.icon-btn {
  background: transparent;
  border: none;
  padding: 6px;
  color: var(--muted);
  display: grid;
  place-items: center;
  border-radius: 8px;
}

.icon-btn:hover:not(:disabled) {
  color: var(--text);
  background: #2b3244;
}

.icon-btn.recording {
  color: var(--danger);
}

.record-timer {
  font-size: 12px;
  color: var(--danger);
  font-variant-numeric: tabular-nums;
}

.chat-input {
  flex: 1;
  border: none;
  background: transparent;
  color: var(--text);
  font-size: 14px;
  line-height: 1.45;
  font-family: inherit;
  resize: none;
  max-height: 120px;
}

.chat-input:focus {
  outline: none;
}

.chat-input::placeholder {
  color: #69728b;
}

.send-btn {
  width: 34px;
  height: 34px;
  border-radius: 10px;
  border: none;
  background: #35405a;
  color: #7f8cad;
  display: grid;
  place-items: center;
  padding: 0;
  line-height: 0;
}

.send-btn.active {
  background: var(--accent);
  color: white;
}

.send-btn svg {
  display: block;
  width: 18px;
  height: 18px;
  flex-shrink: 0;
}

.chat-bottom {
  padding-top: 4px;
}

.history-trigger {
  width: 100%;
  border-radius: 10px;
  background: #0f1219;
  border-color: #3b4358;
}

.profile-pane {
  overflow-y: auto;
}

.profile-content {
  padding: 14px 16px 16px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.profile-content label {
  font-size: 12px;
  color: var(--muted);
  font-weight: 600;
}

.profile-content textarea,
.profile-content input {
  width: 100%;
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 9px 10px;
  background: #1c2130;
  color: var(--text);
  font-size: 13px;
  font-family: inherit;
  resize: vertical;
}

.profile-content textarea:focus,
.profile-content input:focus,
.code-editor:focus {
  outline: none;
  border-color: var(--accent);
}

.profile-content textarea {
  min-height: 100px;
}

.readonly {
  background: #171b27;
  color: #cad4ec;
}

.confidence-wrap {
  display: flex;
  align-items: center;
  gap: 10px;
}

.confidence-bar {
  flex: 1;
  height: 14px;
  border-radius: 999px;
  border: 1px solid var(--border);
  background: #171b27;
  overflow: hidden;
}

.confidence-fill {
  height: 100%;
  width: 0%;
  border-radius: 999px;
  transition: width 0.2s ease, background 0.2s ease;
}

.confidence-text {
  min-width: 58px;
  text-align: right;
  font-size: 11px;
  color: var(--muted);
  font-weight: 600;
}

.confidence-hint {
  font-size: 11px;
  color: #c9d3ed;
  line-height: 1.45;
  min-height: 0;
}

.gaps-text {
  font-size: 13px;
  color: #cad4ec;
  line-height: 1.5;
  white-space: pre-wrap;
}

.profile-group {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.profile-divider {
  margin: 4px 0;
  border: none;
  border-top: 1px dashed #45506a;
}

.right-pane {
  display: grid;
  grid-template-rows: 1fr 1fr;
  gap: 14px;
  min-height: 0;
}

.preview-wrap {
  padding: 0;
  display: flex;
  flex-direction: column;
  min-height: 0;
  flex: 1;
}

.preview-frame {
  flex: 1;
  border: none;
  border-radius: 0;
  background: #0d0f15;
  width: 100%;
  height: 100%;
}

.code-wrap {
  padding: 0;
  display: flex;
  flex-direction: column;
  gap: 0;
  min-height: 0;
  flex: 1;
}

.code-tabs {
  display: flex;
  gap: 6px;
  padding: 8px 10px;
  border-bottom: 1px solid var(--border);
  background: #171b24;
}

.code-tab {
  border-radius: 999px;
  padding: 5px 12px;
  font-size: 11px;
  background: #131823;
  border-color: #414c67;
  color: #aebad8;
}

.code-tab.active {
  background: #2b4c8f;
  border-color: #5f8df7;
  color: #ffffff;
}

.code-tab-panel {
  flex: 1;
  min-height: 0;
  display: none;
  flex-direction: column;
}

.code-tab-panel.active {
  display: flex;
}

.code-editor-shell {
  flex: 1;
  min-height: 0;
  display: flex;
  flex-direction: column;
}

.code-editor {
  flex: 1;
  min-height: 0;
  border: none;
  border-radius: 0;
  background: #141824;
  color: #cdd7f2;
  padding: 12px;
  font-size: 12px;
  line-height: 1.55;
  font-family: "SF Mono", Menlo, Consolas, monospace;
  resize: none;
  width: 100%;
  height: 100%;
}

.CodeMirror {
  flex: 1;
  min-height: 0;
  height: 100%;
  font-size: 12px;
  line-height: 1.55;
  font-family: "SF Mono", Menlo, Consolas, monospace;
  background: #141824;
  color: #cdd7f2;
}

.CodeMirror-gutters {
  border-right: 1px solid #2a3040;
  background: #111521;
}

.console-log {
  flex: 1;
  min-height: 0;
  overflow: auto;
  padding: 10px 12px;
  font-family: "SF Mono", Menlo, Consolas, monospace;
  font-size: 12px;
  line-height: 1.5;
  background: #121722;
}

.console-entry {
  border: 1px solid #2b354c;
  background: #191f2d;
  border-radius: 8px;
  padding: 7px 9px;
  margin-bottom: 8px;
  white-space: pre-wrap;
  word-break: break-word;
}

.console-entry.error {
  border-color: #7a3948;
  background: #2b1820;
  color: #ffd8e1;
}

.console-entry.warn {
  border-color: #6a5828;
  background: #2a2316;
  color: #ffe7af;
}

.console-entry.info {
  border-color: #30466f;
  background: #1a2438;
  color: #cddcff;
}

.console-empty {
  color: #8f9ab7;
  font-size: 12px;
}

.console-time {
  font-size: 10px;
  color: #9aa5c4;
  margin-right: 8px;
}

.code-actions {
  display: flex;
  gap: 8px;
  justify-content: flex-end;
  padding: 10px 12px;
  border-top: 1px solid var(--border);
  background: #171b24;
}

.history-pane {
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  width: 100%;
  background: #171b24;
  border-right: 1px solid var(--border);
  transform: translateX(-102%);
  transition: transform 0.25s ease;
  display: flex;
  flex-direction: column;
  z-index: 8;
  pointer-events: none;
  visibility: hidden;
}

.app.history-open .history-pane {
  transform: translateX(0);
  pointer-events: auto;
  visibility: visible;
}

.fullscreen-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(10, 12, 18, 0.72);
  backdrop-filter: blur(3px);
  z-index: 30;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s ease;
}

.fullscreen-backdrop.active {
  opacity: 1;
  pointer-events: auto;
}

.pane-fullscreen {
  position: fixed !important;
  inset: 0 !important;
  z-index: 40 !important;
  width: auto !important;
  max-width: none !important;
  height: auto !important;
  max-height: none !important;
  border-radius: 0 !important;
  margin: 0 !important;
}

.history-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 14px;
  border-bottom: 1px solid var(--border);
}

.history-head h3 {
  font-size: 22px;
  font-weight: 700;
}

.history-head-actions {
  display: flex;
  align-items: center;
  gap: 8px;
}

.history-help {
  border: 1px solid var(--border);
  width: 34px;
  height: 34px;
  border-radius: 10px;
  background: #121722;

  }
}

function renderInlineMarkdown(text) {
  return (text || "")
    .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
    .replace(/`([^`]+)`/g, "<code>$1</code>");
}

function renderAssistantMarkdown(text) {
  const lines = escapeHtml(text || "").replace(/\r\n?/g, "\n").split("\n");
  const html = [];
  let listType = null;

  const closeList = () => {
    if (listType) {
      html.push(`</${listType}>`);
      listType = null;
    }
  };

  lines.forEach((rawLine) => {
    const line = rawLine.trim();
    if (!line) {
      closeList();
      return;
    }

    const heading = line.match(/^(#{1,4})\s+(.*)$/);
    if (heading) {
      closeList();
      const level = Math.min(4, heading[1].length + 2);
      html.push(`<h${level}>${renderInlineMarkdown(heading[2])}</h${level}>`);
      return;
    }

    const unordered = line.match(/^[-*]\s+(.*)$/);
    if (unordered) {
      if (listType !== "ul") {
        closeList();
        listType = "ul";
        html.push("<ul>");
      }
      html.push(`<li>${renderInlineMarkdown(unordered[1])}</li>`);
      return;
    }

    const ordered = line.match(/^\d+\.\s+(.*)$/);
    if (ordered) {
      if (listType !== "ol") {
        closeList();
        listType = "ol";
        html.push("<ol>");
      }
      html.push(`<li>${renderInlineMarkdown(ordered[1])}</li>`);
      return;
    }

    closeList();
    html.push(`<p>${renderInlineMarkdown(line)}</p>`);
  });

  closeList();
  return html.join("") || `<p>${renderPlainText(text || "")}</p>`;
}

function formatPhase(phase) {

function formatVersionPill(version) {

function templateToDescriptor(item) {
  if (typeof item === "string") {
    return { label: item, text: item, autoSend: false, decision: false };
  }
  return {
    label: item.label || item.text || "",
    text: item.text || item.label || "",
    autoSend: !!item.autoSend,
    decision: !!item.decision,
  };
}

function buildAlternativeDecisionTemplates(alternatives) {
  const count = Math.min(3, Array.isArray(alternatives) ? alternatives.length : 0);
  const templates = [];
  for (let i = 1; i <= count; i += 1) {
    templates.push({
      label: `Option ${i}`,
      text: `${ART_DECISION_OPTION_PREFIX}${i}`,
      autoSend: true,
      decision: true,
    });
  }
  templates.push({ label: "More options", text: ART_DECISION_MORE, autoSend: true, decision: true });
  templates.push({ label: "Modify / Describe Idea", text: ART_DECISION_MODIFY, autoSend: true, decision: true });
  return templates;
}

function dedupeTemplateDescriptors(templates) {
  const seen = new Set();
  return templates
    .map(templateToDescriptor)
    .filter((template) => {
      const key = (template.text || template.label || "")
        .toLowerCase()
        .replace(/[^\w]+/g, " ")
        .trim();
      if (!key || seen.has(key)) {
        return false;
      }
      seen.add(key);
      return true;
    });
}

function sendTemplateMessage(text) {

function renderTemplateRow(phase, pendingArtDecision) {
  const row = $("templateRow");
  if (!row) return;
  row.innerHTML = "";
  row.classList.remove("scrollable");
  const hasDecisionChoices = !!(pendingArtDecision && !pendingArtDecision.awaiting_modify_details);
  let templates = TEMPLATE_MESSAGES[phase] || TEMPLATE_MESSAGES.emotional_discovery;
  if (hasDecisionChoices) {
    const alternatives = Array.isArray(pendingArtDecision.alternatives)
      ? pendingArtDecision.alternatives.filter(Boolean)
      : [];
    templates = alternatives.length
      ? buildAlternativeDecisionTemplates(alternatives)
      : INITIAL_ART_DIRECTION_DECISION_TEMPLATES;
  }
  const descriptors = dedupeTemplateDescriptors(templates);
  row.classList.toggle("scrollable", descriptors.length > 2);
  descriptors.forEach((template) => {
    const btn = document.createElement("button");
    btn.className = "template-chip";
    if (template.decision) {
      btn.classList.add("decision");
    }
    btn.type = "button";
    btn.textContent = template.label;
    btn.addEventListener("click", () => {
      if (template.autoSend) {
        sendTemplateMessage(template.text);
        return;
      }
      const input = $("chatInput");
      input.value = template.text;
      input.focus();
      input.style.height = "auto";
      input.style.height = `${Math.min(input.scrollHeight, 120)}px`;
      updateSendButtonState();
    });
    row.appendChild(btn);
  });
}

function renderConfidence(confidence) {

  const text = $("confidenceText");
  const hint = $("confidenceHint");
  if (!fill || !text) return;
  const key = (confidence || "").toLowerCase();
  const settings = {
    na: { pct: 0, color: "#4a5166", label: "N/A" },
    "n/a": { pct: 0, color: "#4a5166", label: "N/A" },
    low: { pct: 28, color: "#55c29f", label: "LOW" },
    medium: { pct: 62, color: "#f0b454", label: "MEDIUM" },
    high: { pct: 92, color: "#ef6f88", label: "HIGH" },
  };
  const s = settings[key] || settings.na;
  fill.style.width = `${s.pct}%`;
  fill.style.background = s.color;
  text.textContent = s.label;
  if (!hint) return;
  if (key === "low") {
    hint.textContent = "The AI assistant's confidence in understanding your emotions is low. You can still ask it to implement, but it is more likely to produce an inaccurate emotional expression. It is recommended to explore emotions a bit more first.";
    return;
  }
  hint.textContent = "";
}

function requestPreviewExport(kind) {
  return new Promise((resolve, reject) => {
    const iframe = $("previewFrame");
    if (!iframe || !iframe.contentWindow) {
      reject(new Error("Preview is not available."));
      return;
    }
    const requestId = `preview-${kind}-${Date.now()}-${Math.random().toString(36).slice(2, 8)}`;
    const timeout = setTimeout(() => {
      previewExportRequests.delete(requestId);
      reject(new Error(`Preview ${kind.toUpperCase()} export timed out.`));
    }, kind === "gif" ? 15000 : 5000);

    previewExportRequests.set(requestId, { resolve, reject, timeout });
    iframe.contentWindow.postMessage({ type: `preview-export-${kind}`, requestId }, "*");
  });
}

    const time = document.createElement("span");
    time.className = "console-time";
    time.textContent = entry.time;
    const msg = document.createElement("span");
    msg.textContent = entry.message;
    row.appendChild(time);

function appendConsoleLog(level, message) {
  const lvl = level === "error" || level === "warn" ? level : "info";
  const text = (message || "").trim();
  if (!text) return;
  const now = new Date();
  const time = now.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", second: "2-digit" });
  consoleEntries.push({ level: lvl, message: text, time });
  if (consoleEntries.length > 160) {
    consoleEntries = consoleEntries.slice(-160);
  }
  renderConsoleLog();
}

function getExpandedRect(rect, padding) {
  const pad = Number.isFinite(padding) ? padding : 14;
  const margin = 10;
  const left = Math.max(margin, rect.left - pad);
  const top = Math.max(margin, rect.top - pad);
  const right = Math.min(window.innerWidth - margin, rect.right + pad);
  const bottom = Math.min(window.innerHeight - margin, rect.bottom + pad);
  return {
    left,
    top,
    right,
    bottom,
    width: Math.max(40, right - left),
    height: Math.max(40, bottom - top),
  };
}

function clampTourCardPosition(position, cardRect) {
  const margin = 16;
  return {
    left: Math.min(Math.max(position.left, margin), Math.max(margin, window.innerWidth - cardRect.width - margin)),
    top: Math.min(Math.max(position.top, margin), Math.max(margin, window.innerHeight - cardRect.height - margin)),
  };
}

function positionTourCard(targetRect, preferredPlacement) {
  const overlay = $("tourOverlay");
  const card = $("tourCard");
  if (!overlay || !card) return;
  if (tourStepIndex < 0 || !targetRect) {
    overlay.classList.add("welcome-mode");
    card.style.left = "";
    card.style.top = "";
    card.style.transform = "";
    return;
  }

  overlay.classList.remove("welcome-mode");
  const cardRect = card.getBoundingClientRect();
  const gap = 18;
  const isCompact = window.innerWidth <= 980;
  const order = isCompact
    ? ["bottom", "top", "center"]
    : Array.from(new Set([preferredPlacement || "right", "right", "left", "bottom", "top", "center"]));

  const candidates = {
    right: {
      left: targetRect.right + gap,
      top: targetRect.top + (targetRect.height - cardRect.height) / 2,
    },
    left: {
      left: targetRect.left - cardRect.width - gap,
      top: targetRect.top + (targetRect.height - cardRect.height) / 2,
    },
    bottom: {
      left: targetRect.left + (targetRect.width - cardRect.width) / 2,
      top: targetRect.bottom + gap,
    },
    top: {
      left: targetRect.left + (targetRect.width - cardRect.width) / 2,
      top: targetRect.top - cardRect.height - gap,
    },
    center: {
      left: (window.innerWidth - cardRect.width) / 2,
      top: (window.innerHeight - cardRect.height) / 2,
    },
  };

  const fits = (position) => (
    position.left >= 16 &&
    position.top >= 16 &&
    position.left + cardRect.width <= window.innerWidth - 16 &&
    position.top + cardRect.height <= window.innerHeight - 16
  );

  let next = null;
  for (const placement of order) {
    const candidate = candidates[placement];
    if (candidate && fits(candidate)) {
      next = candidate;
      break;
    }
  }

  if (!next) {
    next = clampTourCardPosition(candidates[order[0]] || candidates.center, cardRect);
  }

  card.style.left = `${next.left}px`;
  card.style.top = `${next.top}px`;
  card.style.transform = "translate(0, 0)";
}

function positionActiveTourStep() {
  if (!isTourOpen() || tourStepIndex < 0) return;
  const step = getTourConfig().steps[tourStepIndex];
  const target = getTourTarget(step);
  if (!target) {
    hideTourSpotlight();
    positionTourCard(null, "center");
    return;
  }

  target.scrollIntoView({
    behavior: "smooth",
    block: window.innerWidth <= 1200 ? "center" : "nearest",
    inline: "nearest",
  });

  const place = () => {
    const rect = target.getBoundingClientRect();
    const expanded = getExpandedRect(rect, step.padding);
    showTourSpotlight(expanded);
    positionTourCard(expanded, step.placement);
  };

  requestAnimationFrame(place);
  clearTimeout(tourRepositionTimer);
  tourRepositionTimer = setTimeout(place, 260);
}

function renderTourStep() {
  const config = getTourConfig();
  const steps = config.steps;
  const overlay = $("tourOverlay");
  const stepLabel = $("tourStepLabel");
  const title = $("tourTitle");
  const nextBtn = $("tourNextBtn");
  const backBtn = $("tourBackBtn");
  if (!overlay || !stepLabel || !title || !nextBtn || !backBtn) return;

  if (tourStepIndex < 0 && config.introCopy) {
    overlay.classList.add("welcome-mode");
    stepLabel.textContent = config.introLabel;
    title.textContent = config.introTitle;
    setTourBody(config.introCopy);
    nextBtn.textContent = "Enter";
    backBtn.textContent = "Back";
    backBtn.disabled = false;
    hideTourSpotlight();
    positionTourCard(null, "center");
    requestAnimationFrame(() => nextBtn.focus());
    return;
  }

  const step = steps[tourStepIndex];
  if (!step) {
    closeTutorial({ markSeen: true, focusHelp: true });
    return;
  }
  overlay.classList.remove("welcome-mode");
  stepLabel.textContent = `Step ${tourStepIndex + 1} of ${steps.length}`;
  title.textContent = step.title;
  setTourBody(step.body, step.html || "");
  nextBtn.textContent = tourStepIndex === steps.length - 1 ? "Finish" : "Next";
  backBtn.textContent = "Back";
  backBtn.disabled = !config.introCopy && tourStepIndex === 0;
  requestAnimationFrame(() => {
    positionActiveTourStep();
    nextBtn.focus();
  });
}

function getAppTourStartStep() {
  if (!appState) return -1;
  if (appState.phase === "code_generation") return 8;
  const hasMessages = Array.isArray(appState.messages) && appState.messages.length > 0;
  if (hasMessages) return 2;
  return -1;
}

function openTutorial(kind = "app") {
  activeTourKind = kind;
  if (kind === "app") {
    closeHistory();
  }
  closeFullscreenPane();
  closeDownloadMenu();
  clearTourTimers();
  const config = getTourConfig(kind);
  tourStepIndex = kind === "app" ? getAppTourStartStep() : (config.introCopy ? -1 : 0);
  const overlay = $("tourOverlay");
  if (!overlay) return;
  overlay.hidden = false;
  overlay.setAttribute("aria-hidden", "false");
  requestAnimationFrame(() => {
    overlay.classList.add("visible");
    renderTourStep();
  });
}

function closeTutorial(options = {}) {
  const closingKind = activeTourKind;
  const config = getTourConfig(closingKind);
  const { markSeen = false, focusHelp = true } = options;
  clearTourTimers();
  const overlay = $("tourOverlay");
  if (!overlay) return;
  if (markSeen) {
    markTourSeen(closingKind);
  }
  overlay.classList.remove("visible");
  overlay.setAttribute("aria-hidden", "true");
  hideTourSpotlight();
  tourHideTimer = setTimeout(() => {
    if (!overlay.classList.contains("visible")) {
      overlay.hidden = true;
    }
  }, 220);
  if (focusHelp) {
    requestAnimationFrame(() => {
      $(config.focusId)?.focus();
    });
  }
}

function nextTourStep() {
  const config = getTourConfig();
  const steps = config.steps;
  if (tourStepIndex < 0 && config.introCopy) {
    markTourSeen(config.kind);
    tourStepIndex = 0;
    renderTourStep();
    return;
  }
  if (tourStepIndex >= steps.length - 1) {
    closeTutorial({ markSeen: true });
    return;
  }
  tourStepIndex += 1;
  renderTourStep();
}

function previousTourStep() {
  if (tourStepIndex <= 0) {
    const config = getTourConfig();
    tourStepIndex = config.introCopy ? -1 : 0;
    renderTourStep();
    return;
  }
  tourStepIndex -= 1;
  renderTourStep();
}

  if (!paneId) return;
  if (expandedPaneId === paneId) {
    closeFullscreenPane();
    return;
  }
  closeFullscreenPane();
  const pane = document.querySelector(`.pane-expandable[data-pane-id="${paneId}"]`);
  if (!pane) return;
  pane.classList.add("pane-fullscreen");
  expandedPaneId = paneId;
  const backdrop = $("fullscreenBackdrop");
  if (backdrop) {
    backdrop.hidden = false;
    requestAnimationFrame(() => backdrop.classList.add("active"));
  }
  refreshCodeEditorLayout();
  updateExpandButtons();
}

function showChatLoading() {
  pendingAssistantTyping = true;
  renderMessages(appState && Array.isArray(appState.messages) ? appState.messages : []);
}

function hideChatLoading() {
  pendingAssistantTyping = false;

function clonePendingMediaForDraft(media) {
  if (!media) return null;
  return {
    type: media.type,
    dataUrl: media.dataUrl,
    mime: media.mime,
    name: media.name,
  };
}

function buildOptimisticMessage(text, media) {
  if (text) {
    return { role: "user", type: "text", content: text };
  }
  if (media && media.type === "image") {
    return { role: "user", type: "image", content: media.dataUrl };
  }
  if (media && media.type === "audio") {
    return { role: "user", type: "audio", content: media.dataUrl };
  }
  return null;
}

function restoreComposerDraft(text, media) {
  $("chatInput").value = text || "";
  $("chatInput").style.height = "auto";
  $("chatInput").style.height = `${Math.min($("chatInput").scrollHeight, 120)}px`;
  pendingMedia = media ? { ...media } : null;
  showPendingMedia();
  updateSendButtonState();
}

function clearComposerDraft() {
  $("chatInput").value = "";
  $("chatInput").style.height = "auto";
  clearPendingMedia();
  updateSendButtonState();
}

function createMessageRow(msg, options = {}) {
  const row = document.createElement("div");
  row.className = `message ${msg.role || ""}`.trim();
  if (options.optimistic) {
    row.classList.add("optimistic");
  }

  const avatar = document.createElement("div");
  avatar.className = `avatar ${msg.role === "assistant" ? "assistant-avatar" : "user-avatar"}`;
  avatar.textContent = msg.role === "assistant" ? "✦" : "👤";

  const bubble = document.createElement("div");
  bubble.className = "bubble";
  if (msg.type === "image") {
    bubble.innerHTML = `<img src="${msg.content}" alt="uploaded image" />`;
  } else if (msg.type === "audio") {
    bubble.innerHTML = `<audio controls src="${msg.content}"></audio>`;
  } else if (msg.role === "assistant") {
    bubble.innerHTML = renderAssistantMarkdown(msg.content || "");
  } else {
    bubble.textContent = msg.content || "";
  }

  row.appendChild(avatar);
  row.appendChild(bubble);
  return row;
}

function createTypingIndicatorRow() {
  const row = document.createElement("div");
  row.className = "message chat-typing assistant";

    <div class="avatar assistant-avatar">✦</div>

function updateSendButtonState() {
  const text = $("chatInput").value.trim();
  const canSend = (!!text || !!pendingMedia) && !isRecording && !isSending;
  $("sendBtn").classList.toggle("active", canSend);
  $("sendBtn").disabled = !canSend;
  updateImplementCta();
}

function showPendingMedia() {
  const strip = $("previewStrip");
  const img = $("previewImage");
  const audio = $("previewAudio");
  const name = $("previewName");

  img.style.display = "none";
  audio.style.display = "none";
  img.src = "";
  audio.src = "";
  name.textContent = "";

  if (!pendingMedia) {
    strip.classList.remove("active");
    updateSendButtonState();
    return;
  }

  strip.classList.add("active");
  name.textContent = pendingMedia.name || (pendingMedia.type === "audio" ? "Audio clip" : "Image");
  if (pendingMedia.type === "image") {
    img.style.display = "block";
    img.src = pendingMedia.dataUrl;
  } else {
    audio.style.display = "block";
    audio.src = pendingMedia.previewUrl || pendingMedia.dataUrl;
  }
  updateSendButtonState();
}

function clearPendingMedia() {
  if (pendingMedia && pendingMedia.previewUrl) {
    URL.revokeObjectURL(pendingMedia.previewUrl);
  }
  pendingMedia = null;
  showPendingMedia();
}

function formatTimer(totalSeconds) {
  const mm = String(Math.floor(totalSeconds / 60)).padStart(2, "0");
  const ss = String(totalSeconds % 60).padStart(2, "0");
  return `${mm}:${ss}`;
}

async function startRecording() {
  try {
    recorderStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    const chunks = [];
    recorder = new MediaRecorder(recorderStream);
    isRecording = true;
    $("recordBtn").classList.add("recording");
    $("recordTimer").style.display = "inline";
    recordingSeconds = 0;
    $("recordTimer").textContent = "00:00";
    recordingTimer = setInterval(() => {
      recordingSeconds += 1;
      $("recordTimer").textContent = formatTimer(recordingSeconds);
    }, 1000);

    recorder.ondataavailable = (event) => {
      if (event.data && event.data.size > 0) {
        chunks.push(event.data);
      }
    };

    recorder.onstop = async () => {
      try {
        clearInterval(recordingTimer);
        recordingTimer = null;
        $("recordBtn").classList.remove("recording");
        $("recordTimer").style.display = "none";
        if (recorderStream) {
          recorderStream.getTracks().forEach((track) => track.stop());
          recorderStream = null;
        }
        const blob = new Blob(chunks, { type: "audio/webm" });
        const dataUrl = await fileToDataUrl(blob);
        const previewUrl = URL.createObjectURL(blob);
        pendingMedia = {
          type: "audio",
          dataUrl,
          mime: "audio/webm",
          name: "Recorded audio",
          previewUrl,
        };
        showPendingMedia();
      } catch (error) {
        alert("Audio processing failed. Please try recording again.");
      } finally {
        recorder = null;
        isRecording = false;
        updateSendButtonState();
      }
    };

    recorder.start();
    updateSendButtonState();
  } catch (error) {
    isRecording = false;
    recorder = null;
    updateSendButtonState();
    alert("Microphone access is required to record audio.");
  }
}

function stopRecording() {
  if (!recorder) {
    isRecording = false;
    updateSendButtonState();
    return;
  }
  if (recorder.state !== "inactive") {
    recorder.stop();
  } else {
    recorder = null;
    isRecording = false;
    updateSendButtonState();
  }
}

function renderMessages(messages) {
  const container = $("messages");
  container.innerHTML = "";
  const actualMessages = Array.isArray(messages) ? messages : [];
  const hasPendingUi = !!pendingOutgoingMessage || pendingAssistantTyping;

  if (!actualMessages.length && !hasPendingUi) {
    const hint = document.createElement("div");
    hint.className = "empty-hint";
    hint.textContent = "Share a personal moment, upload an image, or record audio to begin.";
    container.appendChild(hint);
    return;
  }

  actualMessages.forEach((msg) => {
    if (msg.type === "system") {
      const row = document.createElement("div");
      row.className = "message system";
      row.innerHTML = `<div class="bubble">${renderPlainText(msg.content || "")}</div>`;
      container.appendChild(row);
      return;
    }
    container.appendChild(createMessageRow(msg));
  });

  if (pendingOutgoingMessage) {
    container.appendChild(createMessageRow(pendingOutgoingMessage, { optimistic: true }));
  }

  if (pendingAssistantTyping) {
    container.appendChild(createTypingIndicatorRow());
  }

  container.scrollTop = container.scrollHeight;
}

function buildPreviewBridgeScript() {
  return `
    var gifWorkerUrl = null;
    var gifWorkerPromise = null;

    function sendParentMessage(payload) {
      parent.postMessage(payload, "*");
    }

    function sendExportResult(payload) {
      sendParentMessage(Object.assign({ type: "preview-export-result" }, payload));
    }

    function getSketchCanvas() {
      return document.querySelector("canvas");
    }

    function sendExportError(requestId, message) {
      sendExportResult({ requestId: requestId, ok: false, error: message });
    }

    function ensureGifWorkerUrl() {
      if (gifWorkerUrl) {
        return Promise.resolve(gifWorkerUrl);
      }
      if (gifWorkerPromise) {
        return gifWorkerPromise;
      }

      gifWorkerPromise = fetch("https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.worker.js")
        .then(function(response) {
          if (!response.ok) {
            throw new Error("Could not load the GIF export worker.");
          }
          return response.text();
        })
        .then(function(source) {
          gifWorkerUrl = URL.createObjectURL(new Blob([source], { type: "application/javascript" }));
          return gifWorkerUrl;
        })
        .catch(function(error) {
          gifWorkerPromise = null;
          throw error;
        });

      return gifWorkerPromise;
    }

    function exportPreviewImage(requestId) {
      try {
        var canvas = getSketchCanvas();
        if (!canvas) {
          sendExportError(requestId, "There is no preview image to download yet.");
          return;
        }
        sendExportResult({
          requestId: requestId,
          ok: true,
          kind: "image",
          dataUrl: canvas.toDataURL("image/png"),
        });
      } catch (error) {
        sendExportError(requestId, error.message || "Could not export the preview image.");
      }
    }

    async function exportPreviewGif(requestId) {
      var canvas = getSketchCanvas();
      if (!canvas) {
        sendExportError(requestId, "There is no preview animation to export yet.");
        return;
      }
      if (typeof GIF !== "function") {
        sendExportError(requestId, "GIF export is still loading. Please try again in a moment.");
        return;
      }
      try {
        var width = canvas.width || canvas.clientWidth || 600;
        var height = canvas.height || canvas.clientHeight || 400;
        var working = document.createElement("canvas");
        working.width = width;
        working.height = height;
        var ctx = working.getContext("2d");
        if (!ctx) {
          sendExportError(requestId, "Could not access the preview canvas for GIF export.");
          return;
        }

        var delay = 100;
        var frameCount = 18;
        var workerUrl = await ensureGifWorkerUrl();
        var gif = new GIF({
          workers: 2,
          quality: 10,
          width: width,
          height: height,
          background: "#0d0f15",
          workerScript: workerUrl,
        });

        gif.on("finished", function(blob) {
          var reader = new FileReader();
          reader.onloadend = function() {
            sendExportResult({
              requestId: requestId,
              ok: true,
              kind: "gif",
              dataUrl: reader.result,
            });
          };
          reader.onerror = function() {
            sendExportError(requestId, "Could not prepare the GIF download.");
          };
          reader.readAsDataURL(blob);
        });

        gif.on("abort", function() {
          sendExportError(requestId, "GIF export was cancelled.");
        });

        var captured = 0;
        function captureFrame() {
          ctx.clearRect(0, 0, width, height);
          ctx.drawImage(canvas, 0, 0, width, height);
          gif.addFrame(working, { copy: true, delay: delay });
        }

        captureFrame();
        captured += 1;

        var interval = setInterval(function() {
          try {
            captureFrame();
            captured += 1;
            if (captured >= frameCount) {
              clearInterval(interval);
              gif.render();
            }
          } catch (error) {
            clearInterval(interval);
            sendExportError(requestId, error.message || "Could not capture the preview animation.");
          }
        }, delay);
      } catch (error) {
        sendExportError(requestId, error.message || "Could not export the preview GIF.");
      }
    }

    window.addEventListener("message", function(event) {
      var data = event.data || {};
      if (data.type === "preview-export-image") {
        exportPreviewImage(data.requestId);
      } else if (data.type === "preview-export-gif") {
        exportPreviewGif(data.requestId);
      }
    });

    window.addEventListener("error", function(e) {
      sendParentMessage({ type: "p5-error", message: e.message || "Unknown error" });
    });
  `;
}

function wrapGraphText(text, maxCharsPerLine) {
  const clean = (text || "").replace(/\s+/g, " ").trim();
  if (!clean) return ["Version update"];
  const words = clean.split(" ");
  const lines = [];
  let line = "";
  words.forEach((word) => {
    let token = word;
    while (token.length > maxCharsPerLine) {
      if (line) {
        lines.push(line);
        line = "";
      }
      lines.push(token.slice(0, maxCharsPerLine));
      token = token.slice(maxCharsPerLine);
    }
    if (!token) return;
    if (!line) {
      line = token;
      return;
    }
    if (line.length + 1 + token.length <= maxCharsPerLine) {
      line += ` ${token}`;
      return;
    }
    lines.push(line);
    line = token;
  });
  if (line) lines.push(line);
  return lines;
}

function renderHistoryGraph(data) {
  historyData = data;
  const svg = $("historySvg");
  svg.innerHTML = "";
  const versions = data.nodes || [];
  if (!versions.length) {
    svg.setAttribute("height", 120);
    svg.innerHTML = '<text x="16" y="44" fill="#97a0b6" font-size="13">No versions yet.</text>';
    return;
  }

  const sorted = [...versions].sort((a, b) => (a.created_at || 0) - (b.created_at || 0));
  const branches = [...new Set(sorted.map((v) => v.branch || "main"))];
  const xByBranch = {};
  branches.forEach((branch, index) => {
    xByBranch[branch] = 30 + index * 26;
  });

  const maxBranchX = Math.max(...Object.values(xByBranch));
  const labelX = maxBranchX + 52;
  const lineHeight = 18;
  const maxCharsPerLine = 54;
  const rowMinHeight = 56;
  const rowPadding = 18;
  const yStart = 22;
  const pos = {};
  const layout = [];
  let currentY = yStart;
  let longestTextLen = 0;
  sorted.forEach((version) => {
    const summary = (version.summary || "Version update").trim();
    const summaryLines = wrapGraphText(summary, maxCharsPerLine);
    summaryLines.forEach((line) => {
      if (line.length > longestTextLen) longestTextLen = line.length;
    });
    const metaText = `${version.branch} • ${version.id}`;
    if (metaText.length > longestTextLen) longestTextLen = metaText.length;

    const textBlockHeight = summaryLines.length * lineHeight + 12;
    const rowHeight = Math.max(rowMinHeight, textBlockHeight + rowPadding);
    const centerY = currentY + rowHeight / 2;
    const x = xByBranch[version.branch || "main"];
    pos[version.id] = { x, y: centerY };
    layout.push({ version, summaryLines, rowHeight, centerY });
    currentY += rowHeight;
  });
  const width = Math.max(620, Math.ceil(labelX + longestTextLen * 6.7 + 28));
  const height = Math.max(280, Math.ceil(currentY + 18));
  svg.setAttribute("viewBox", `0 0 ${width} ${height}`);
  svg.setAttribute("height", height);

  sorted.forEach((version) => {
    if (!version.parent_id || !pos[version.parent_id]) return;
    const from = pos[version.parent_id];
    const to = pos[version.id];
    const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
    const midY = (from.y + to.y) / 2;
    path.setAttribute("d", `M ${from.x} ${from.y} C ${from.x} ${midY}, ${to.x} ${midY}, ${to.x} ${to.y}`);
    path.setAttribute("class", "graph-edge");
    const colorIndex = branches.indexOf(version.branch || "main") % BRANCH_COLORS.length;
    path.setAttribute("stroke", BRANCH_COLORS[colorIndex]);
    svg.appendChild(path);
  });

  layout.forEach((entry) => {
    const { version, summaryLines } = entry;
    const point = pos[version.id];
    if (!point) return;

    const group = document.createElementNS("http://www.w3.org/2000/svg", "g");
    group.setAttribute("class", "graph-node");

    const selected = selectedHistoryVersionId === version.id;
    const isHead = data.branch_heads && data.branch_heads[version.branch] === version.id;

    const dot = document.createElementNS("http://www.w3.org/2000/svg", "circle");
    dot.setAttribute("cx", point.x);
    dot.setAttribute("cy", point.y);
    dot.setAttribute("r", selected ? "8.5" : isHead ? "7" : "5.5");
    dot.setAttribute("fill", selected ? "#ffffff" : "#76a2ff");
    dot.setAttribute("stroke", selected ? "#5f8df7" : "none");
    dot.setAttribute("stroke-width", selected ? "3" : "0");
    group.appendChild(dot);

    const label = document.createElementNS("http://www.w3.org/2000/svg", "text");
    const firstLineY = point.y - ((summaryLines.length - 1) * lineHeight) / 2 - 2;
    label.setAttribute("x", labelX);
    label.setAttribute("y", firstLineY);
    label.setAttribute("class", "graph-label");
    summaryLines.forEach((line, index) => {
      const span = document.createElementNS("http://www.w3.org/2000/svg", "tspan");
      span.setAttribute("x", String(labelX));
      if (index > 0) span.setAttribute("dy", String(lineHeight));
      span.textContent = line;
      label.appendChild(span);
    });
    group.appendChild(label);

    const meta = document.createElementNS("http://www.w3.org/2000/svg", "text");
    meta.setAttribute("x", labelX);
    meta.setAttribute("y", firstLineY + summaryLines.length * lineHeight + 10);
    meta.setAttribute("class", "graph-meta");
    meta.textContent = `${version.branch} • ${version.id}`;
    group.appendChild(meta);

    group.addEventListener("click", () => {
      selectedHistoryVersionId = version.id;
      historyPreviewVersionId = version.id;
      const selectedVersion = getVersionById(version.id);
      if (selectedVersion) {
        loadVersionToPanes(selectedVersion);
      }
      $("restoreBtn").disabled = false;
      renderHistoryGraph(data);
    });

    svg.appendChild(group);
  });
}

async function sendChat(forcedText = null) {
  if (isSending || isRecording) return;
  const usingComposerDraft = forcedText == null;
  const text = (usingComposerDraft ? $("chatInput").value : forcedText || "").trim();
  const activeMedia = usingComposerDraft ? pendingMedia : null;
  if (!text && !activeMedia) return;
  const draftMedia = clonePendingMediaForDraft(activeMedia);
  const optimisticMessage = buildOptimisticMessage(text, draftMedia);

  const payload = { session_id: sessionId, message: text };
  if (activeMedia) {
    if (activeMedia.type === "image") {
      payload.image = activeMedia.dataUrl;
      payload.image_mime = activeMedia.mime || "image/png";
    } else {
      payload.audio = activeMedia.dataUrl;
      payload.audio_mime = activeMedia.mime || "audio/webm";
    }
  }

  isSending = true;
  pendingOutgoingMessage = optimisticMessage;
  if (usingComposerDraft) {
    clearComposerDraft();
  } else {
    updateSendButtonState();
  }
  showChatLoading();
  try {
    const response = await fetch(`${API}/chat`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload),
    });
    const data = await response.json();
    if (!response.ok) {
      pendingOutgoingMessage = null;
      pendingAssistantTyping = false;
      if (usingComposerDraft) {
        restoreComposerDraft(text, draftMedia);
      }
      renderMessages(appState && Array.isArray(appState.messages) ? appState.messages : []);
      appendConsoleLog("error", data.error || "Chat request failed.");
      alert(data.error || "Chat request failed.");
      return;
    }
    captureLlmStatusFromChatResponse(data);
    const raw = typeof data.raw_response === "string" ? data.raw_response.toLowerCase() : "";
    if (raw.includes("couldn") && raw.includes("reach the model")) {
      appendConsoleLog("warn", "LLM service was unavailable for this turn. A fallback response was used.");
    }

    pendingOutgoingMessage = null;
    pendingAssistantTyping = false;
    renderState(data.state);
    if (isHistoryOpen) {
      await fetchHistory();
    }
  } catch (error) {
    pendingOutgoingMessage = null;
    pendingAssistantTyping = false;
    if (usingComposerDraft) {
      restoreComposerDraft(text, draftMedia);
    }
    renderMessages(appState && Array.isArray(appState.messages) ? appState.messages : []);
    appendConsoleLog("error", `Network error: ${error.message}`);
    alert(`Network error: ${error.message}`);
  } finally {
    hideChatLoading();
    isSending = false;
    updateSendButtonState();
  }
}

      version_id: selectedHistoryVersionId,
    }),
  });
  const data = await response.json();
  if (!response.ok) {
    appendConsoleLog("error", data.error || "Could not restore version.");
    alert(data.error || "Could not restore version.");
    return;
  }
  historyPreviewVersionId = null;
  renderState(data.state);
  closeHistory();
}

async function openHistoryTutorial() {
  if (!isHistoryOpen) {
    await openHistory({ showTutorial: false });
  }
  openTutorial("history");
}

async function openHistory(options = {}) {
  const { showTutorial = true } = options;
  if (!appState) return;
  isHistoryOpen = true;
  $("appRoot").classList.add("history-open");
  selectedHistoryVersionId = appState.current_version ? appState.current_version.id : null;
  historyPreviewVersionId = selectedHistoryVersionId;
  $("restoreBtn").disabled = !selectedHistoryVersionId;
  try {
    await fetchHistory();
  } finally {
    if (showTutorial && !hasSeenHistoryTutorial() && isHistoryOpen) {
      requestAnimationFrame(() => openHistoryTutorial());
    }
  }
}

function closeHistory() {
  isHistoryOpen = false;
  $("appRoot").classList.remove("history-open");
  historyPreviewVersionId = null;
  selectedHistoryVersionId = null;
  $("restoreBtn").disabled = true;
  if (appState && appState.current_version) {
    loadVersionToPanes(appState.current_version);
  }
}

async function startNewSession() {
  const response = await fetch(`${API}/new-session`, { method: "POST" });
  const data = await response.json();
  if (!response.ok) {
    appendConsoleLog("error", data.error || "Could not create a new session.");
    alert(data.error || "Could not create a new session.");
    return;
  }
  historyPreviewVersionId = null;
  renderState(data.state);
}

async function resetSession() {
  const response = await fetch(`${API}/reset`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ session_id: sessionId }),
  });
  const data = await response.json();
  if (!response.ok) {
    appendConsoleLog("error", data.error || "Could not reset session.");
    alert(data.error || "Could not reset session.");
    return;
  }
  historyPreviewVersionId = null;
  renderState(data.state);
}

window.addEventListener("message", (event) => {
  const data = event.data || {};
  if (data.type === "preview-export-result") {
    const pending = previewExportRequests.get(data.requestId);
    if (!pending) return;
    clearTimeout(pending.timeout);
    previewExportRequests.delete(data.requestId);
    if (data.ok) {
      pending.resolve(data);
    } else {
      pending.reject(new Error(data.error || "Preview export failed."));
    }
    return;
  }

  if (data.type !== "p5-error") return;
  const msg = `Preview error: ${data.message || "Unknown error"}`;
  appendConsoleLog("error", msg);
  const row = document.createElement("div");
  row.className = "message system";
  row.innerHTML = `<div class="bubble">${escapeHtml(msg)}</div>`;
  $("messages").appendChild(row);
  $("messages").scrollTop = $("messages").scrollHeight;
});

function bindById(id, eventName, handler) {
  const el = $(id);
  if (!el) {
    console.error(`Missing element: #${id}`);
    return;
  }
  el.addEventListener(eventName, handler);
}

function initializeApp() {
  initializeCodeEditor();
  renderConsoleLog();
  setCodeTab("code");

  document.querySelectorAll(".pane-expand-btn").forEach((btn) => {
    btn.addEventListener("click", () => {
      openFullscreenPane(btn.dataset.paneTarget);
    });
  });

  bindById("fullscreenBackdrop", "click", closeFullscreenPane);

  window.addEventListener("keydown", (event) => {
    if (event.key === "Escape") {
      if (isDownloadMenuOpen) {
        closeDownloadMenu();
        return;
      }
      if (isTourOpen()) {
        closeTutorial({ markSeen: true });
      } else {
        closeFullscreenPane();
      }
    }
  });

  window.addEventListener("resize", () => {
    refreshCodeEditorLayout();
    if (isTourOpen() && tourStepIndex >= 0) {
      positionActiveTourStep();
    }
  });

  bindById("chatInput", "input", () => {
    const ta = $("chatInput");
    ta.style.height = "auto";
    ta.style.height = `${Math.min(ta.scrollHeight, 120)}px`;
    updateSendButtonState();
  });

  bindById("chatInput", "keydown", (event) => {
    if (event.key === "Enter" && !event.shiftKey) {
      event.preventDefault();
      sendChat();
    }
  });

  bindById("sendBtn", "click", (event) => {
    event.preventDefault();
    sendChat();
  });
  bindById("implementCtaBtn", "click", () => {
    sendChat(IMPLEMENT_CTA_MESSAGE);
  });
  bindById("downloadBtn", "click", (event) => {
    event.stopPropagation();
    toggleDownloadMenu();
  });
  bindById("downloadCodeBtn", "click", downloadCodeFile);
  bindById("downloadImageBtn", "click", downloadPreviewImage);
  bindById("downloadGifBtn", "click", downloadPreviewGif);

  document.querySelector(".download-wrap")?.addEventListener("click", (event) => {
    event.stopPropagation();
  });
  document.addEventListener("click", () => {
    if (isDownloadMenuOpen) {
      closeDownloadMenu();
    }
  });

  bindById("removePreviewBtn", "click", clearPendingMedia);
  bindById("imageBtn", "click", () => $("imageInput").click());

  bindById("imageInput", "change", async (event) => {
    const file = event.target.files && event.target.files[0];
    if (!file) return;
    const dataUrl = await fileToDataUrl(file);
    clearPendingMedia();
    pendingMedia = {
      type: "image",
      dataUrl,
      mime: file.type || "image/png",
      name: file.name || "Image",
    };
    showPendingMedia();
    event.target.value = "";
  });

  bindById("recordBtn", "click", async () => {
    if (recorder) {
      stopRecording();
      return;
    }
    clearPendingMedia();
    await startRecording();
  });

  bindById("runBtn", "click", () => {
    runPreview(getCodeValue() || "");
  });
  bindById("codeTabBtn", "click", () => setCodeTab("code"));
  bindById("consoleTabBtn", "click", () => setCodeTab("console"));
  bindById("saveVersionBtn", "click", saveVersion);
  bindById("historyBtn", "click", () => openHistory());
  bindById("historyHelpBtn", "click", openHistoryTutorial);
  bindById("closeHistoryBtn", "click", closeHistory);
  bindById("restoreBtn", "click", restoreSelectedVersion);
  bindById("newSessionBtn", "click", startNewSession);
  bindById("resetBtn", "click", resetSession);
  bindById("helpBtn", "click", () => openTutorial("app"));
  bindById("tourNextBtn", "click", nextTourStep);
  bindById("tourBackBtn", "click", previousTourStep);
  bindById("tourSkipBtn", "click", () => closeTutorial({ markSeen: true }));

  fetchState()
    .then(() => {
      updateSendButtonState();
      updateExpandButtons();
      refreshCodeEditorLayout();
      if (!hasSeenInstructions()) {
        requestAnimationFrame(() => openTutorial("app"));
      }
    })
    .catch((error) => {
      console.error("Initial state fetch failed:", error);
      updateSendButtonState();
      updateExpandButtons();
      refreshCodeEditorLayout();
      if (!hasSeenInstructions()) {
        requestAnimationFrame(() => openTutorial("app"));
      }
    });
}

if (document.readyState === "loading") {
  document.addEventListener("DOMContentLoaded", initializeApp);
} else {
  initializeApp();
}
</script>
</body>
</html>
